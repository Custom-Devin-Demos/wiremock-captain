services:
  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: wiremock-container
    ports:
      - '8080:8080'
    volumes:
      - ./extensions:/var/wiremock/extensions
    command: --record-mappings --verbose --extensions org.wiremock.webhooks.Webhooks
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/__admin/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
